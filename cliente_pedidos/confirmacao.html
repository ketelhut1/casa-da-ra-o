<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedido confirmado | Casa das Rações Isa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link rel="stylesheet" href="./compra.css" />

<body>
  <main class="layout" style="grid-template-columns: minmax(0, 760px); justify-content:center; margin-top: 2rem;">

        <a id="whatsBtn" class="details-btn" href="#" target="_blank" rel="noopener noreferrer" style="text-decoration:none; display:inline-block;">Falar no WhatsApp</a>
